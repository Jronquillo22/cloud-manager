version: '3.8'

services:
  web:
    image: jronquillo22/mi-app:latest
    container_name: mi-app
    ports:
      - "80:80"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: appdb
    ports:
      - "3306:3306"