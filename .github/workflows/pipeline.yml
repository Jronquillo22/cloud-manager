name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t jronquillo22/mi-app:latest .

      - name: Test básico
        run: docker run jimmyr226/mi-app:latest echo "CI OK"

  cd:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build image
        run: docker build -t jronquillo22/mi-app:latest .

      - name: Push image
        run: docker push jronquillo22/mi-app:latest