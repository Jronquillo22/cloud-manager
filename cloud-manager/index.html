<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TechNova Services</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<section id="loginView" class="view">

  <div class="box">

    <h2>Iniciar Sesión</h2>

    <input id="loginUser" placeholder="Usuario">
    <input id="loginPass" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>

    <p>
      ¿No tienes cuenta?
      <button onclick="showRegister()">Crear cuenta</button>
    </p>

  </div>

</section>

<!-- REGISTER -->
<section id="registerView" class="view hidden">

  <div class="box">

    <h2>Registro</h2>

    <input id="regUser" placeholder="Usuario">
    <input id="regPass" type="password" placeholder="Contraseña">

    <select id="regRole">
      <option value="usuario">Usuario</option>
      <option value="admin">Administrador</option>
    </select>

    <button onclick="register()">Registrarse</button>

    <p>
      ¿Ya tienes cuenta?
      <button onclick="showLogin()">Volver</button>
    </p>

  </div>

</section>

<!-- APP -->
<section id="appView" class="hidden">

  <div class="navbar">
    <h3>TechNova Services</h3>
    <button onclick="logout()">Salir</button>
  </div>

  <div class="content">
    <h2 id="welcome"></h2>
  </div>

</section>

<script src="app.js"></script>
</body>
</html>
