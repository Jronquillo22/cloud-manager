<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fuego Energy Cloud System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox" class="box">
    <h2> Login</h2>

    <input type="text" id="loginUser" placeholder="Usuario">
    <input type="password" id="loginPass" placeholder="Contraseña">

    <button class="btn" onclick="login()">Entrar</button>

    <button class="btn-secondary" onclick="showRegister()">Crear cuenta</button>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" class="box hidden">
    <h2> Registro</h2>

    <input type="text" id="regUser" placeholder="Usuario">
    <input type="password" id="regPass" placeholder="Contraseña">

    <div class="role-box">
      <button onclick="setRole('user')">Usuario</button>
      <button onclick="setRole('admin')">Admin</button>
    </div>

    <p id="roleSelected">Rol: Usuario</p>

    <button class="btn" onclick="register()">Registrarse</button>
    <button class="btn-secondary" onclick="showLogin()">Volver</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">
    <h1> Fuego Energy Cloud Dashboard</h1>

    <button onclick="logout()">Cerrar sesión</button>

    <div id="adminPanel" class="panel hidden">
      <h2> Panel Admin</h2>
      <p>Gestión de usuarios del sistema</p>

      <h3> Usuarios registrados</h3>
      <ul id="userList"></ul>
    </div>

    <div id="userPanel" class="panel hidden">
      <h2>👤 Panel Usuario</h2>
      <p>Monitoreo del sistema cloud</p>
      <ul>
        <li>EC2: Activo 🟢</li>
        <li>Docker: Running 🟢</li>
        <li>CI/CD: OK 🟢</li>
      </ul>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
