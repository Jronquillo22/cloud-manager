<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TechNova Services</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="center-box">
  <h2>Inicio de sesión</h2>

  <input id="loginUser" placeholder="Usuario">
  <input id="loginPass" type="password" placeholder="Contraseña">

  <button onclick="login()">Ingresar</button>
  <button onclick="showRegister()">Crear cuenta</button>
</div>

<!-- REGISTER -->
<div id="registerBox" class="center-box hidden">
  <h2>Registro</h2>

  <input id="regUser" placeholder="Usuario">
  <input id="regPass" type="password" placeholder="Contraseña">

  <div>
    <button onclick="setRole('usuario')">Usuario</button>
    <button onclick="setRole('administrador')">Administrador</button>
  </div>

  <button onclick="register()">Registrarse</button>
  <button onclick="showLogin()">Volver</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- NAVBAR -->
  <div class="navbar">
    <div>TechNova Services</div>

    <div class="nav-buttons">
      <button onclick="showView('user')">Panel</button>
      <button onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="content">

    <!-- USER PANEL -->
    <div id="userPanel" class="view hidden">
      <h2>Panel de Usuario</h2>

      <div class="grid">

        <div class="card">
          <h3>Agendar cita</h3>
          <input id="citaServicio" placeholder="Servicio">
          <input id="citaFecha" type="date">
          <button onclick="guardarCita()">Enviar</button>
        </div>

        <div class="card">
          <h3>Cotización</h3>
         <select id="cotServicio">
            <option value="Infraestructura Cloud">Infraestructura Cloud</option>
            <option value="Soporte Técnico">Soporte Técnico</option>
            <option value="Seguridad Informática">Seguridad Informática</option>
            <option value="Despliegue DevOps">Despliegue DevOps</option>
            <option value="Automatización de sistemas">Automatización de sistemas</option>
            </select>
          <button onclick="guardarCotizacion()">Enviar</button>
        </div>

        <div class="card full">
          <h3>Respuestas</h3>
          <div id="userResponses"></div>
        </div>

      </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="view hidden">

      <h2>Panel Administrador</h2>

      <h3>Usuarios</h3>
      <table>
        <thead>
          <tr>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="userTable"></tbody>
      </table>

      <h3>Citas</h3>
      <table>
        <tbody id="citaTable"></tbody>
      </table>

      <h3>Cotizaciones</h3>
      <table>
        <tbody id="cotTable"></tbody>
      </table>

    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
