<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TechNova Services</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="center-box">
  <h2>Inicio de sesión</h2>

  <input id="loginUser" placeholder="Usuario">
  <input id="loginPass" type="password" placeholder="Contraseña">

  <button onclick="login()">Ingresar</button>
  <button onclick="showRegister()">Crear cuenta</button>
</div>

<!-- REGISTER -->
<div id="registerBox" class="center-box hidden">
  <h2>Registro</h2>

  <input id="regUser" placeholder="Usuario">
  <input id="regPass" type="password" placeholder="Contraseña">

  <div class="role-buttons">
    <button onclick="setRole('usuario')">Usuario</button>
    <button onclick="setRole('administrador')">Administrador</button>
  </div>

  <button onclick="register()">Registrarse</button>
  <button onclick="showLogin()">Volver</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <!-- NAVBAR -->
  <div class="navbar">
    <div>TechNova Services</div>

    <div class="nav-buttons">
      <button onclick="showView('dashboard')">Dashboard</button>
      <button onclick="showView('citas')">Citas</button>
      <button onclick="showView('cotizaciones')">Cotizaciones</button>
      <button onclick="logout()">Salir</button>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="content">

    <!-- USER -->
    <div id="userPanel" class="view hidden">
      <h2>Panel de Usuario</h2>

      <div class="grid">
        <div class="card">
          <h3>Solicitar cita</h3>
          <input id="citaServicio" placeholder="Servicio">
          <input id="citaFecha" type="date">
          <button onclick="guardarCita()">Enviar</button>
        </div>
        <div id="userPanel" class="view hidden"></div>
        <div class="card full">
        <h3>Respuestas</h3>
        <div id="userResponses"></div>
        </div>


        <div class="card">
          <h3>Solicitar cotización</h3>
          <input id="cotServicio" placeholder="Servicio">
          <textarea id="cotDetalle" placeholder="Detalle"></textarea>
          <button onclick="guardarCotizacion()">Enviar</button>
        </div>
        >

        <div class="card full">
          <h3>Respuestas</h3>
          <div id="userResponses"></div>
        </div>
      </div>
    </div>

    <!-- ADMIN -->
    <div id="adminPanel" class="view hidden">

      <h2>Panel Administrador</h2>

      <div class="table-container">

        <h3>Usuarios</h3>
        <table>
          <thead>
            <tr>
              <th>Usuario</th>
              <th>Rol</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="userTable"></tbody>
        </table>

        <h3>Citas</h3>
        <table>
          <thead>
            <tr>
              <th>Servicio</th>
              <th>Fecha</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="citaTable"></tbody>
        </table>

        <h3>Cotizaciones</h3>
        <table>
          <thead>
            <tr>
              <th>Servicio</th>
              <th>Detalle</th>
              <th>Respuesta</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="cotTable"></tbody>
        </table>

      </div>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
